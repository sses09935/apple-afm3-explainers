<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'PingFang TC','Noto Sans CJK TC','Noto Sans TC',sans-serif" role="img" aria-label="IFP NAND/DRAM 選擇性載入">
  <defs>
    <style>.t{fill:#16181d}.s{fill:#3c4049;font-size:12px}.lbl{font-size:13px;font-weight:700}</style>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0b5fd4"/>
    </marker>
  </defs>
  <text x="20" y="28" class="t" font-size="16" font-weight="700">AFM 3 Core Advanced：IFP 的 NAND → DRAM 選擇性載入</text>

  <!-- NAND -->
  <rect x="30" y="70" width="250" height="250" rx="12" fill="#eef2f7" stroke="#5b6472" stroke-width="1.5"/>
  <text x="46" y="95" class="lbl t">NAND（flash，全模型權重）</text>
  <text x="46" y="114" class="s">整個 full model 存於此（非 DRAM）</text>

  <!-- experts grid -->
  <g>
    <rect x="48" y="130" width="50" height="34" rx="5" fill="#cfddf0" stroke="#5b6472"/>
    <rect x="106" y="130" width="50" height="34" rx="5" fill="#cfddf0" stroke="#5b6472"/>
    <rect x="164" y="130" width="50" height="34" rx="5" fill="#0b5fd4" stroke="#0b2a4a"/>
    <rect x="48" y="172" width="50" height="34" rx="5" fill="#0b5fd4" stroke="#0b2a4a"/>
    <rect x="106" y="172" width="50" height="34" rx="5" fill="#cfddf0" stroke="#5b6472"/>
    <rect x="164" y="172" width="50" height="34" rx="5" fill="#cfddf0" stroke="#5b6472"/>
    <rect x="48" y="214" width="50" height="34" rx="5" fill="#cfddf0" stroke="#5b6472"/>
    <rect x="106" y="214" width="50" height="34" rx="5" fill="#0b5fd4" stroke="#0b2a4a"/>
    <rect x="164" y="214" width="50" height="34" rx="5" fill="#cfddf0" stroke="#5b6472"/>
  </g>
  <text x="46" y="278" class="s">藍 = 本次 prompt 選中的 routed experts</text>
  <text x="46" y="298" class="s">多數參數 = FFN 的 expert weights</text>

  <!-- selector -->
  <rect x="310" y="150" width="140" height="84" rx="10" fill="#0b5fd4"/>
  <text x="380" y="180" text-anchor="middle" fill="#fff" class="lbl">per-prompt</text>
  <text x="380" y="200" text-anchor="middle" fill="#fff" class="lbl">routing</text>
  <text x="380" y="220" text-anchor="middle" fill="#fff" font-size="11">mask predictor 依指令選</text>

  <!-- DRAM -->
  <rect x="480" y="70" width="250" height="250" rx="12" fill="#e9f1fd" stroke="#0b5fd4" stroke-width="1.5"/>
  <text x="496" y="95" class="lbl t">DRAM（執行）</text>
  <text x="496" y="114" class="s">patch 成可執行的 dense model</text>
  <rect x="498" y="130" width="100" height="40" rx="6" fill="#9cc2f5" stroke="#0b5fd4"/>
  <text x="548" y="155" text-anchor="middle" class="s">shared experts</text>
  <rect x="610" y="130" width="100" height="40" rx="6" fill="#9cc2f5" stroke="#0b5fd4"/>
  <text x="660" y="155" text-anchor="middle" class="s">always-active</text>
  <rect x="498" y="180" width="60" height="40" rx="6" fill="#0b5fd4"/>
  <rect x="566" y="180" width="60" height="40" rx="6" fill="#0b5fd4"/>
  <text x="638" y="205" class="s">+ routed</text>
  <text x="496" y="248" class="s">生成過程週期性重選與更新</text>
  <text x="496" y="268" class="s">active 參數量依情境預先決定</text>
  <text x="496" y="288" class="s">→ 規模超越傳統 DRAM 限制、壓低延遲</text>

  <!-- arrows -->
  <path d="M280,192 L308,192" fill="none" stroke="#0b5fd4" stroke-width="2" marker-end="url(#ar2)"/>
  <path d="M452,192 L478,192" fill="none" stroke="#0b5fd4" stroke-width="2" marker-end="url(#ar2)"/>

  <text x="380" y="345" text-anchor="middle" class="s">因 NAND→DRAM 頻寬慢，無法逐 token 換權重，故 per-prompt routing。對應 KB-016–020 [S01]</text>
</svg>
